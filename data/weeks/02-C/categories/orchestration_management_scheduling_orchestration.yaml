- crunchbase: https://www.crunchbase.com/organization/cloud-native-computing-foundation
  description: CoHDI (Composable Hardware in Disaggregated Infrastructure) enables
    dynamic device scaling across next-generation architectures. As a community-driven,
    standards-based open ecosystem, CoHDI focuses on expanding cloud-native frameworks
    built on disaggregate infrastructure. Our core objective is to bridge the gap
    between Kubernetes and underlying hardware by actively collaborating with upstream
    projects to increase cloud native composability, specifically Dynamic Resource
    Allocation (DRA), Autoscaler, and Scheduling. By integrating these cloud-native
    capabilities, CoHDI empowers data center and infrastructure operators to maximize
    cost efficiency, achieve high availability, and drive sustainability through a
    seamlessly disaggregated computing system.
  featured: true
  homepage_url: https://github.com/CoHDI
  logo: cohdi.svg
  name: CoHDI
  project: sandbox
  repo_url: https://github.com/CoHDI
