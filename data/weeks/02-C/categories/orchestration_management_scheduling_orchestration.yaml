- crunchbase: https://www.crunchbase.com/organization/cloud-native-computing-foundation
  description: Enables dynamic device scaling using Composable Hardware Disaggregated
    Infrastructure (CoHDI). CoHDI is a community-driven, standards-based open ecosystem
    for next-generation architectures and frameworks built on Composable Hardware
    Disaggregated Infrastructure. The objective is to bridge the gap between Kubernetes
    and CoHDI by collaborating with the Dynamic Resource Allocation, Autoscaler, and
    Scheduler projects. This enables data center operators to realize the benefits
    of cost efficiency, high availability, and sustainability through a disaggregated
    computing system.
  featured: true
