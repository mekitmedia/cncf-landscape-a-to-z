name: Central Publish Router

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*' # Ansible collection tags
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g., infra-bootstrap-tools-agentic@0.1.1, v1.0.0)'
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # ROUTER LOGIC
  determine-target:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.parse.outputs.tag_name }}
      version: ${{ steps.parse.outputs.version }}
      is_agentic: ${{ steps.parse.outputs.is_agentic }}
      is_stacks: ${{ steps.parse.outputs.is_stacks }}
      is_ansible: ${{ steps.parse.outputs.is_ansible }}
    steps:
      - id: parse
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          elif [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "tag_name=$TAG" >> $GITHUB_OUTPUT

          IS_AGENTIC="false"
          IS_STACKS="false"
          IS_ANSIBLE="false"
          VERSION=""

          if [[ "$TAG" == infra-bootstrap-tools-agentic@* ]]; then
            IS_AGENTIC="true"
            VERSION="${TAG#*@}"
          elif [[ "$TAG" == infra-bootstrap-tools-stacks@* ]]; then
            IS_STACKS="true"
            VERSION="${TAG#*@}"
          elif [[ "$TAG" == v* ]]; then
            # Assuming v* is for Ansible Collection
            IS_ANSIBLE="true"
            VERSION="${TAG#v}"
          fi

          echo "is_agentic=$IS_AGENTIC" >> $GITHUB_OUTPUT
          echo "is_stacks=$IS_STACKS" >> $GITHUB_OUTPUT
          echo "is_ansible=$IS_ANSIBLE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Tag: $TAG, Version: $VERSION, Target Agentic: $IS_AGENTIC, Target Stacks: $IS_STACKS, Target Ansible: $IS_ANSIBLE"

  # DELEGATION TO REUSABLE WORKFLOWS
  publish-agentic:
    needs: determine-target
    if: ${{ needs.determine-target.outputs.is_agentic == 'true' }}
    uses: ./.github/workflows/tmpl-publish-python.yml
    with:
      package_dir: 'agentic'
      version: ${{ needs.determine-target.outputs.version }}
      tag_name: ${{ needs.determine-target.outputs.tag_name }}
      publish_pypi: true # Publishing to PyPI is a next step documented
    secrets: inherit

  publish-stacks:
    needs: determine-target
    if: ${{ needs.determine-target.outputs.is_stacks == 'true' }}
    uses: ./.github/workflows/tmpl-publish-stacks.yml
    with:
      version: ${{ needs.determine-target.outputs.version }}
      tag_name: ${{ needs.determine-target.outputs.tag_name }}
      stacks_dir: 'stacks'
    secrets: inherit

  publish-ansible:
    needs: determine-target
    if: ${{ needs.determine-target.outputs.is_ansible == 'true' }}
    uses: ./.github/workflows/tmpl-publish-ansible.yml
    with:
      version: ${{ needs.determine-target.outputs.version }}
      tag_name: ${{ needs.determine-target.outputs.tag_name }}
      collection_dir: 'ansible'
    secrets: inherit
