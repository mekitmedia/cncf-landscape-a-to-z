name: Reusable Stacks Publish

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string
      tag_name:
        description: 'GitHub Release Tag Name'
        required: true
        type: string
      stacks_dir:
        description: 'Directory containing stacks (e.g. stacks)'
        required: true
        type: string
        default: 'stacks'

jobs:
  publish-stacks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Create stack archives
        run: |
          VERSION="${{ inputs.version }}"
          mkdir -p dist

          # Create individual stack archives
          for stack in ${{ inputs.stacks_dir }}/*/; do
            if [ -d "$stack" ] && [ "$(basename "$stack")" != "node_modules" ]; then
              stack_name=$(basename "$stack")
              echo "Creating archive for $stack_name"
              (cd "$(dirname "$stack")" && zip -r "../dist/${stack_name}-${VERSION}.zip" "$stack_name" -x "*/node_modules/*" "*.git/*")
            fi
          done

          # Create a complete stacks archive
          echo "Creating complete stacks archive"
          (cd ${{ inputs.stacks_dir }} && zip -r "../dist/infra-bootstrap-tools-stacks-${VERSION}.zip" . -x "node_modules/*" "*.git/*" "*/node_modules/*")

          ls -lh dist/

      - name: Upload archives to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag_name }}" \
            dist/*.zip \
            --clobber
