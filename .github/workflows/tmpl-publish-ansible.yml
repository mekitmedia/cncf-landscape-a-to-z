name: Reusable Ansible Publish

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        required: true
        type: string
      tag_name:
        description: 'GitHub Release Tag Name'
        required: true
        type: string
      collection_dir:
        description: 'Directory containing galaxy.yml (e.g. ansible)'
        required: true
        type: string
        default: 'ansible'
    secrets:
      GALAXY_API_KEY:
        required: true

jobs:
  publish-ansible:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Ansible dependencies
        run: pip install ansible-core yq

      - name: Update collection version
        run: yq -i ".version = \"${{ inputs.version }}\"" ${{ inputs.collection_dir }}/galaxy.yml

      - name: Build Ansible Collection
        id: build
        run: |
          OUTPUT=$(ansible-galaxy collection build ${{ inputs.collection_dir }})
          TARBALL=$(echo "$OUTPUT" | grep -o 'Created collection file .*.tar.gz' | sed 's/Created collection file //')
          echo "TARBALL=$TARBALL" >> $GITHUB_OUTPUT

      - name: Publish collection to Ansible Galaxy
        uses: artis3n/ansible_galaxy_collection@v2
        with:
          api_key: ${{ secrets.GALAXY_API_KEY }}
          collection_dir: ${{ inputs.collection_dir }}

      - name: Upload collection to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag_name }}" \
            ${{ steps.build.outputs.TARBALL }} \
            --clobber
